<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Hairstyle AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --border: #2a2a3a;
      --accent: #c8a96e;
      --text: #e8e8f0;
      --muted: #888899;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,169,110,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .logo p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 6px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card > p {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 28px;
    }

    .input-group { margin-bottom: 16px; }

    .input-group label {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus { border-color: var(--accent); }
    .input-group input::placeholder { color: var(--muted); }
    .input-group input.error { border-color: #e85a5a; }
    .input-group input.success { border-color: #4acea8; }

    /* Toggle password visibility */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }
    .toggle-pw:hover { color: var(--accent); }

    /* Error message */
    .error-msg {
      color: #e85a5a;
      font-size: 0.78rem;
      margin-top: 6px;
      padding-left: 2px;
    }

    /* General form error box */
    .form-error {
      background: rgba(232,90,90,0.1);
      border: 1px solid rgba(232,90,90,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #e85a5a;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .btn-login:hover {
      background: #d4b87a;
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(200,169,110,0.25);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .switch {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .switch a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .switch a:hover { text-decoration: underline; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .divider span {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider p { color: var(--muted); font-size: 0.78rem; }

    /* Password requirements hint */
    .pw-hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
      padding-left: 2px;
    }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="logo">
    <h1>✦ Hairstyle AI</h1>
    <p>Your personal AI hair analysis studio</p>
  </div>

  <div class="card">
    <h2>Welcome Back</h2>
    <p>Login to continue to your dashboard</p>

    <!-- General error box -->
    <div class="form-error" id="formError">⚠ Invalid email or password. Please try again.</div>

    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"
             oninput="clearFieldError('email')">
    </div>

    <div class="input-group">
      <label>Password</label>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="Enter your password"
               oninput="clearFieldError('password')"
               onkeydown="if(event.key==='Enter') login()">
        <button class="toggle-pw" type="button" onclick="togglePassword('password', this)">
          👁
        </button>
      </div>
      <div class="pw-hint">Must be at least 8 characters</div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">Login →</button>

    <div class="divider">
      <span></span>
      <p>or</p>
      <span></span>
    </div>

    <p class="switch">
      Don't have an account? <a href="signup.html">Create one</a>
    </p>
  </div>

</div>

<script src="../js/auth.js"></script>
</body>
</html>
